
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KALKULATOR ZAWARTOŚCI KARTUSZA TURYSTYCZNEGO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥾</text></svg>" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ddaa00;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }
    h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
      margin-bottom: 4px;
      color: #FFFDF7;
    }
    .subtitle {
      font-size: 1rem;
      font-family: 'Oswald', sans-serif;
      color: #FFFDF7;
      margin-bottom: 28px;
    }
    .card {
      background: #FFFFFF;
  border: 1px solid #E8DCC0;
  box-shadow: 0 10px 30px rgba(74,47,27,0.08);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
      
    }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8A6A4A;
      margin-bottom: 8px;
    }
    select, input[type="number"] {
      width: 100%;
     background: #FFFFFF;
      border: 1px solid #D9C7A3;
      color: #4A2F1B;
      border-radius: 10px;
      font-size: 1.05rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
      margin-bottom: 20px;
    }
    select:focus, input[type="number"]:focus {
      border-color: #DCAA00;
    }
    .select-wrapper {
      position: relative;
    }
    .select-wrapper::after {
      content: "▾";
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-65%);
      pointer-events: none;
      color: #888;
      font-size: 1.1rem;
    }
    input[type="number"]::-webkit-inner-spin-button { opacity: 0.4; }
    .weight-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      margin-bottom: 20px;
    }
    .weight-row > div { flex: 1; margin-bottom: 0; }
    .weight-row select { margin-bottom: 0; }
    .weight-row input { margin-bottom: 0; }
    .weight-range-hint {
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 8px;
      min-height: 1em;
    }
    /* Result */
    .result {
      display: none;
      margin-top: 8px;
    }
    .result.visible { display: block; }
    .fuel-pct {
      font-size: 3.5rem;
      font-weight: 800;
      text-align: center;
      line-height: 1;
      margin-bottom: 6px;
    }
    .fuel-label {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 20px;
    }
    .bar-bg {
      background: #F3E8C8;
      border-radius: 999px;
      height: 18px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.5s ease, background 0.5s ease;
    }
    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .detail-box {
       background: #FFF8E6;
  border: 1px solid #E8DCC0;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .detail-val {
      font-size: 1.3rem;
      font-weight: 700;
      color: #040506;
    }
    .detail-lbl {
      font-size: 0.7rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 2px;
    }
    .hint {
      text-align: center;
      font-size: 0.82rem;
      color: #555;
      margin-top: 14px;
    }
    .error-msg {
      display: none;
      background: #3d1520;
      border: 1px solid #e94560;
      border-radius: 10px;
      padding: 12px;
      font-size: 0.85rem;
      color: #e94560;
      text-align: center;
      margin-top: 8px;
    }
    .error-msg.visible { display: block; }
    /* color coding */
    .color-full    { color: #4ade80; }
    .color-high    { color: #86efac; }
    .color-mid     { color: #fbbf24; }
    .color-low     { color: #fb923c; }
    .color-empty   { color: #e94560; }
    .bar-full  { background: #4ade80; }
    .bar-high  { background: #86efac; }
    .bar-mid   { background: #fbbf24; }
    .bar-low   { background: #fb923c; }
    .bar-empty { background: #e94560; }
    /* Boil box */
    .boil-box {
      background: #ddaa00;
      border-radius: 12px;
      padding: 16px 12px 14px;
      text-align: center;
      margin-top: 10px;
      margin-bottom: 10px;
    }
    .boil-count {
      font-size: 2.6rem;
      font-weight: 800;
      color: #eee;
      line-height: 1;
    }
    .boil-lbl {
      font-size: 0.72rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 3px;
      margin-bottom: 8px;
    }
    .boil-sub {
      font-size: 1rem;
      color: #040506;
      margin-bottom: 12px;
      min-height: 1em;
    }
    .boil-size-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .boil-size-lbl {
      font-size: 0.72rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-right: 2px;
    }
    .boil-btn {
       background: white;
  border: 1px solid #D9C7A3;
  color: #8A6A4A;
      border-radius: 20px;
      font-size: 0.78rem;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .boil-btn.active {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
      font-weight: 600;
    }
    /* Social footer */
    .social-footer {
      margin-top: 32px;
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
    }
    .social-link {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #888;
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    .social-link:hover { color: #eee; }
    .social-link svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    @media (max-width: 380px) {
      .fuel-pct { font-size: 2.8rem;
                text-shadow: 0 2px 8px rgba(220,170,0,0.15);}
    }
  </style>
</head>
<body>
<h1>KALKULATOR ZAWARTOŚCI KARTUSZA TURYSTYCZNEGO</h1>
<p class="subtitle">ZWAŻ SWÓJ KARTUSZ → SPRAWDŻ ILE GAZU ZOSTAŁO</p>
<div class="card">
  <label>Marka kartusza &amp; rozmiar</label>
  <div class="select-wrapper">
    <select id="canister" onchange="onCanisterChange()">
      <option value="">— Wybierz rodzaj kartusza —</option>
      <option value="coleman-220">Coleman 220 g</option>
      <option value="jetboil-100">Jetboil 100 g</option>
      <option value="jetboil-230">Jetboil 230 g</option>
      <option value="jetboil-450">Jetboil 450 g</option>
      <option value="kovea-230">Kovea 230 g</option>
      <option value="msr-110">MSR 110 g</option>
      <option value="msr-227">MSR 227 g</option>
      <option value="msr-450">MSR 450 g</option>
      <option value="optimus-100">Optimus 100 g</option>
      <option value="optimus-230">Optimus 230 g</option>
      <option value="primus-100">Primus 100 g</option>
      <option value="primus-230">Primus 230 g</option>
      <option value="snowpeak-110">SnowPeak Gigapower 110 g</option>
      <option value="snowpeak-220">SnowPeak Gigapower 220 g</option>
    </select>
  </div>
  <label>Obecna waga</label>
  <div class="weight-range-hint" id="weightRangeHint"></div>
  <div class="weight-row">
    <div style="flex:2">
      <input type="number" id="weight" placeholder="e.g. 220" min="0" max="800" oninput="calculate()" />
    </div>
    <div style="flex:1">
      <div class="select-wrapper">
        <select id="unit" onchange="calculate()">
          <option value="g">g</option>
          <option value="oz">oz</option>
        </select>
      </div>
    </div>
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <div class="result" id="result">
    <div class="fuel-pct" id="pctDisplay">—</div>
    <div class="fuel-label">Pozostały gaz</div>
    <div class="bar-bg">
      <div class="bar-fill" id="barFill" style="width:0%"></div>
    </div>
    <div class="details-grid">
      <div class="detail-box">
        <div class="detail-val" id="fuelLeft">—</div>
        <div class="detail-lbl">Pozostały gaz (g)</div>
      </div>
      <div class="detail-box">
        <div class="detail-val" id="canisterWt">—</div>
        <div class="detail-lbl">Waga pustego (g)</div>
      </div>
      <div class="detail-box">
        <div class="detail-val" id="fullWt">—</div>
        <div class="detail-lbl">Waga pełnego (g)</div>
      </div>
      <div class="detail-box">
        <div class="detail-val" id="fuelCap">—</div>
        <div class="detail-lbl">Pozostała zawartość (g)</div>
      </div>
    </div>
    <div class="boil-box" id="boilBox">
      <div class="boil-count" id="boilCount">—</div>
      <div class="boil-lbl">ilość "zagotowań wody"</div>
      <div class="boil-sub" id="boilSub"></div>
      <div class="boil-size-row">
        <span class="boil-size-lbl">Rozmiar garnka:</span>
        <button class="boil-btn active" data-g="8"  onclick="setPotSize(this)">500 ml</button>
        <button class="boil-btn"        data-g="12" onclick="setPotSize(this)">750 ml</button>
        <button class="boil-btn"        data-g="16" onclick="setPotSize(this)">1 L</button>
      </div>
    </div>
    <p class="hint" id="hintText"></p>
  </div>
</div>

<div class="card">
  <a class="social-link" href="https://www.instagram.com/planeta_alp/" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
      <circle cx="12" cy="12" r="4"/>
      <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
    </svg>
    @planeta_alp
  </a>
  <a class="social-link" href="https://planetaalp2026.systeme.io/planeta-alp" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M23 7s-.3-2-1.2-2.8c-1.1-1.2-2.4-1.2-3-1.3C16.2 2.8 12 2.8 12 2.8s-4.2 0-6.8.2c-.6.1-1.9.1-3 1.3C1.3 5 1 7 1 7S.7 9.1.7 11.3v2c0 2.1.3 4.3.3 4.3s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7.5 21.8 12 21.8 12 21.8s4.2 0 6.8-.3c.6-.1 1.9-.1 3-1.3.9-.8 1.2-2.8 1.2-2.8s.3-2.1.3-4.3v-2C23.3 9.1 23 7 23 7zM9.7 15.5V8.1l8.1 3.7-8.1 3.7z"/>
    </svg>
    Planeta ALp
  </a>
</div>

<script>
  // g of fuel per boil by pot size
  let gPerBoil = 8; // default: 500 ml
  function setPotSize(btn) {
    document.querySelectorAll(".boil-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    gPerBoil = parseInt(btn.dataset.g);
    updateBoils();
  }
  let lastFuelLeft = 0;
  function updateBoils() {
    if (lastFuelLeft === null) return;
    const boils = Math.floor(lastFuelLeft / gPerBoil);
    document.getElementById("boilCount").textContent = boils > 0 ? boils : "< 1";
    const potLabels = { 8: "500 ml", 12: "750 ml", 16: "1 L" };
    document.getElementById("boilSub").textContent =
      boils > 0
        ? `~${gPerBoil}gramów gazu na zagotowanie ${potLabels[gPerBoil]} wody`
        : "Zbyt mało gazu na jedno zagotowania.";
  }
  // Data: { empty, full, fuelWeight }
  const CANISTERS = {
    "coleman-220":    { empty: 143, full: 363, fuel: 220 },
    "jetboil-100":    { empty: 99,  full: 199, fuel: 100 },
    "jetboil-230":    { empty: 152, full: 382, fuel: 230 },
    "jetboil-450":    { empty: 216, full: 666, fuel: 450 },
    "kovea-230":      { empty: 132, full: 362, fuel: 230 },
    "msr-110":        { empty: 101, full: 211, fuel: 110 },
    "msr-227":        { empty: 151, full: 378, fuel: 227 },
    "msr-450":        { empty: 216, full: 666, fuel: 450 },
    "optimus-100":    { empty: 100, full: 200, fuel: 100 },
    "optimus-230":    { empty: 130, full: 360, fuel: 230 },
    "primus-100":     { empty: 100, full: 200, fuel: 100 },
    "primus-230":     { empty: 151, full: 381, fuel: 230 },
    "snowpeak-110":   { empty: 103, full: 213, fuel: 110 },
    "snowpeak-220":   { empty: 150, full: 370, fuel: 220 },
  };
  function onCanisterChange() {
    const key = document.getElementById("canister").value;
    const hint = document.getElementById("weightRangeHint");
    if (key && CANISTERS[key]) {
      const c = CANISTERS[key];
      hint.textContent = `Zakres wagi: ${c.empty}g (pusty) – ${c.full}g (pełny)`;
    } else {
      hint.textContent = "";
    }
    calculate();
  }
  function calculate() {
    const key = document.getElementById("canister").value;
    const rawWeight = parseFloat(document.getElementById("weight").value);
    const unit = document.getElementById("unit").value;
    const result = document.getElementById("result");
    const errMsg = document.getElementById("errorMsg");
    result.classList.remove("visible");
    errMsg.classList.remove("visible");
    if (!key || isNaN(rawWeight) || rawWeight === "") return;
    const weightG = unit === "oz" ? rawWeight * 28.3495 : rawWeight;
    const c = CANISTERS[key];
    if (weightG < c.empty - 5) {
      errMsg.textContent = `Waga wydaje sięzbyt niska — kartusz pusty ${c.fuel}g kartusz waży ${c.empty}g.`;
      errMsg.classList.add("visible");
      return;
    }
    if (weightG > c.full + 5) {
      errMsg.textContent = `Waga wydaje się zbyt wysoka — kartusz pełny ${c.fuel}g kartusz waży ${c.full}g.`;
      errMsg.classList.add("visible");
      return;
    }
    const fuelLeft = Math.max(0, weightG - c.empty);
    lastFuelLeft = fuelLeft;
    const pct = Math.min(100, Math.round((fuelLeft / c.fuel) * 100));
    // Color tier
    let tier;
    if (pct >= 70)      tier = "full";
    else if (pct >= 40) tier = "high";
    else if (pct >= 20) tier = "mid";
    else if (pct > 0)   tier = "low";
    else                tier = "empty";
    const pctEl = document.getElementById("pctDisplay");
    pctEl.textContent = pct + "%";
    pctEl.className = "fuel-pct color-" + tier;
    const bar = document.getElementById("barFill");
    bar.style.width = pct + "%";
    bar.className = "bar-fill bar-" + tier;
    document.getElementById("fuelLeft").textContent  = Math.round(fuelLeft) + " g";
    document.getElementById("canisterWt").textContent = c.empty + " g";
    document.getElementById("fullWt").textContent     = c.full + " g";
    document.getElementById("fuelCap").textContent    = c.fuel + " g";
    // Hint
    const hints = {
      full:  "Jest git! 🏔️",
      high:  "Wystarczy na Twojego tripa.",
      mid:   "Przelicz, czy na pewno wystarczy.",
      low:   "Trochę cienko - dokup jeden kartusz.",
      empty: "Kartusz w zasadzie pusty.",
    };
    document.getElementById("hintText").textContent = hints[tier];
    updateBoils();
    result.classList.add("visible");
  }
</script>
</body>
</html>
